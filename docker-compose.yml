version: '3.8'

# ==========================================
# ⚓ 提取公共的 Agent 配置基底 (YAML 锚点复用)
# ==========================================
x-agent-base: &agent-base
  build:
    context: .
    dockerfile: Dockerfile
  restart: always
  environment:
    - REDIS_URL=redis://redis:6379/0  # 指向下面的 redis 容器
    - LOG_LEVEL=INFO
    # 如果你的 session 隔离鉴权需要独立的密钥，可以配在这里
    - AUTH_SECRET_KEY=your_production_secret
  depends_on:
    redis:
      condition: service_healthy

services:
  # 🧠 1. 分布式消息总线 (Redis)
  redis:
    image: redis:7-alpine
    container_name: stream_agent_redis
    ports:
      - "6379:6379"
    # 开启 AOF 持久化，防止宕机导致 PEL 队列中的任务丢失
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 🌐 2. 多模态流式网关 (Gateway)
  gateway:
    <<: *agent-base
    container_name: stream_agent_gateway
    # 假设你的网关启动脚本是 examples/03_ai_company/main.py
    command: ["examples/03_ai_company/main.py"]
    ports:
      - "8000:8000"

  # 🎯 3. 总控路由大脑 (Dispatcher)
  dispatcher:
    <<: *agent-base
    container_name: stream_agent_dispatcher
    # 假设你为每个 Agent 编写了独立的启动入口
    command: ["scripts/run_dispatcher.py"]

  # ✍️ 4. 文案策划集群 (Writer) - ✨ 动态扩缩容展示
  writer_agent:
    <<: *agent-base
    command: ["scripts/run_writer.py"]
    deploy:
      mode: replicated
      replicas: 3 # 🔥 一键拉起 3 个 Writer 实例去瓜分 bus:events:writer 队列的任务！

  # 💻 5. 高级程序员 (Coder) - ✨ 带 Docker 嵌套权限
  coder_agent:
    <<: *agent-base
    container_name: stream_agent_coder
    command: ["scripts/run_coder.py"]
    volumes:
      # 将宿主机的 Docker 进程挂载进容器 (Docker-out-of-Docker)
      # 这样 CoderAgent 就能在代码里调包拉起隔离沙盒了！
      - /var/run/docker.sock:/var/run/docker.sock